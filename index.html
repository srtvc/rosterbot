            left: 0;

            z-index: 40; 
            border-right: 1px solid #e2e8f0;

        /* Mobile "Rolling" Sidebar Shadow */

                <div class="flex flex-wrap gap-4 mt-6 px-4 justify-start opacity-50">
                    <div class="flex items-center gap-2 text-[9px] font-black text-slate-400 uppercase">
                        <span class="w-3 h-3 bg-purple-200 border border-purple-300 rounded"></span> Manual Tweak

    <!-- Modals -->
    <div id="extend-modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-md z-[100] flex items-center justify-center p-6">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-sm w-full shadow-2xl">
            <h3 class="text-2xl font-black mb-6 text-slate-900">Extend timeline</h3>
            <input type="number" id="ext-val" value="7" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-black mb-8 focus:ring-2 focus:ring-indigo-600 outline-none">
            <div class="flex gap-3">
                <button onclick="closeModals()" class="flex-1 py-4 bg-slate-100 rounded-2xl font-bold text-slate-600 uppercase text-xs">Cancel</button>
                <button onclick="doExtend()" class="flex-1 py-4 bg-indigo-600 rounded-2xl font-bold text-white uppercase text-xs">Extend</button>
            </div>
        </div>
    </div>

    <script>
        // --- Persistence ---
        let staff = [
            { id: '1', name: 'PK', restDay: 2 },
            { id: '2', name: 'SS', restDay: 3 },
            { id: '3', name: 'AG', restDay: 4 },
            { id: '4', name: 'RR', restDay: 5 }
        ];
        let registry = {}; 
        let isMobile = false;

        const PATTERN = ['R', 'D', 'MN', 'O', 'D', 'MN', 'O'];
        const WEEKDAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

        document.getElementById('start-date').valueAsDate = new Date();
        renderStaff();
        renderTable();

        function toggleLayout() {
            isMobile = !isMobile;
            const root = document.getElementById('body-root');
            const dBtn = document.getElementById('d-btn');
            const mBtn = document.getElementById('m-btn');
            if (isMobile) {
                root.classList.replace('mode-desktop', 'mode-mobile');
                mBtn.className = 'px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all bg-indigo-600 text-white shadow-md';
                dBtn.className = 'px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all text-slate-400';
            } else {
                root.classList.replace('mode-mobile', 'mode-desktop');
                dBtn.className = 'px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all bg-indigo-600 text-white shadow-md';
                mBtn.className = 'px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all text-slate-400';
            }
            renderTable();
        }

        function renderStaff() {
            const container = document.getElementById('staff-list');
            container.innerHTML = '';
            staff.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'flex items-center gap-3 p-3 bg-slate-50 rounded-2xl border border-slate-100 transition-all hover:border-indigo-300';
                div.innerHTML = `
                    <div class="flex flex-col">
                        <button onclick="moveStaff(${i},-1)" class="text-slate-300 hover:text-indigo-600 ${i===0?'invisible':''}"><svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M14.707 12.707a1 1 0 01-1.414 0L10 9.414l-3.293 3.293a1 1 0 01-1.414-1.414l4-4a1 1 0 011.414 0l4 4a1 1 0 010 1.414z"></path></svg></button>
                        <button onclick="moveStaff(${i},1)" class="text-slate-300 hover:text-indigo-600 ${i===staff.length-1?'invisible':''}"><svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"></path></svg></button>
                    </div>
                    <input type="text" value="${p.name}" onchange="updateName(${i}, this.value)" class="flex-1 bg-transparent font-black text-slate-800 outline-none text-xs min-w-0">
                    <select onchange="staff[${i}].restDay=parseInt(this.value);renderTable()" class="bg-white border-none rounded-lg text-[8px] font-black text-slate-400 p-2 outline-none ring-1 ring-slate-100">
                        ${WEEKDAYS.map((d,idx) => `<option value="${idx}" ${p.restDay===idx?'selected':''}>${d}</option>`).join('')}
                    </select>
                    <button onclick="staff.splice(${i},1);renderStaff();renderTable()" class="text-slate-200 hover:text-red-500 p-1">×</button>
                `;
                container.appendChild(div);
            });
        }

        function updateName(idx, val) {
            const old = staff[idx].name; const next = val.toUpperCase(); staff[idx].name = next;
            Object.keys(registry).forEach(k => { if(k.startsWith(old+'-')){ registry[next+'-'+k.split('-').slice(1).join('-')] = registry[k]; delete registry[k]; } });
            renderTable();
        }

        function moveStaff(idx, dir) { [staff[idx], staff[idx+dir]] = [staff[idx+dir], staff[idx]]; renderStaff(); renderTable(); }
        function addStaff() { staff.push({ id: Date.now().toString(), name: 'NEW', restDay: 0 }); renderStaff(); renderTable(); }

        function renderTable() {
            const startDate = new Date(document.getElementById('start-date').value);
            const days = parseInt(document.getElementById('days-count').value);
            const table = document.getElementById('roster-table');
            const dates = [];
            for(let i=0; i<days; i++) {
                const d = new Date(startDate); d.setDate(startDate.getDate() + i);
                dates.push({ iso: d.toISOString().split('T')[0], day: d.getDate(), month: d.toLocaleDateString('en-GB', { month: 'short' }), weekday: WEEKDAYS[d.getDay()] });
            }
            
            let html = `<thead><tr class="bg-slate-50 border-b border-slate-200">
                <th class="sticky-col text-left font-black text-slate-400 uppercase text-[8px] tracking-[0.2em]">Personnel</th>`;
            dates.forEach(d => {
                html += `<th class="p-3 sm:p-4 text-center border-r border-slate-100 min-w-[80px] sm:min-w-[110px]">
                    <div class="text-[9px] text-indigo-500 font-black tracking-tighter">${d.weekday}</div>
                    <div class="text-slate-900 font-black text-[10px] sm:text-xs">${d.day} ${d.month}</div>
                </th>`;
            });
            html += `</tr></thead><tbody class="divide-y divide-slate-100">`;
            
            staff.forEach(p => {
                html += `<tr><td class="sticky-col font-black text-slate-700 transition-all text-xs sm:text-sm">
                    ${p.name}
                    <div class="text-[7px] text-indigo-300 uppercase font-black mt-1 tracking-widest">${WEEKDAYS[p.restDay]} Anchor</div>
                </td>`;
                dates.forEach(d => {
                    const key = `${p.name}-${d.iso}`;
                    const entry = registry[key] || { val: '', tweak: false };
                    html += `<td class="p-0 border-r border-slate-50">
                        <input type="text" id="cell-${key}" value="${entry.val}" oninput="tweakCell('${p.name}','${d.iso}',this.value)" placeholder="-" class="cell-input w-full p-2 text-center bg-transparent font-black uppercase transition-all ${entry.tweak?'is-tweak':''} shift-${entry.val}">
                    </td>`;
                });
                html += `</tr>`;
            });
            
            html += `<tr class="bg-slate-900 text-white"><td class="sticky-col !bg-slate-900 font-black text-[7px] uppercase text-slate-500 italic tracking-[0.2em] px-4">Status</td>`;
            dates.forEach(d => html += `<td id="cov-${d.iso}" class="p-2 text-center text-[7px] font-black">-</td>`);
            html += `</tr></tbody>`;
            table.innerHTML = html;
            validate();
        }

        function tweakCell(name, date, val) {
            const key = `${name}-${date}`; const up = val.toUpperCase();
            
            // Leave Sanctity Rule: If marking L on O shift day, previous MN must be removed
            if (up === 'L') {
                const prevD = new Date(date); prevD.setDate(prevD.getDate()-1);
                const prevIso = prevD.toISOString().split('T')[0];
                const prevKey = `${name}-${prevIso}`;
                if (registry[prevKey]?.val === 'MN') {
                    delete registry[prevKey]; // Remove the Night shift if Leave replaces the recovery
                }
            }

            if (up === '') delete registry[key]; else registry[key] = { val: up, tweak: true };
            renderTable();
        }

        function runTacticalSolver() {
            const start = new Date(document.getElementById('start-date').value);
            const days = parseInt(document.getElementById('days-count').value);
            const buffer = {};
            const debt = {}; // Track withdrawn rests per person

            for(let i=0; i<days; i++) {
                const ds = dIso(start, i);
                let dayAsgn = {};
                
                // Pass 1: Apply Manual Tweaks
                staff.forEach(p => { 
                    const k = `${p.name}-${ds}`; 
                    if(registry[k]?.tweak) dayAsgn[p.name] = registry[k].val; 
                });

                // Pass 2: Recovery Logic (O after MN)
                if (i > 0) {
                    const pds = dIso(start, i-1);
                    staff.forEach(p => { 
                        if (buffer[`${p.name}-${pds}`] === 'MN' && !dayAsgn[p.name]) dayAsgn[p.name] = 'O'; 
                    });
                }

                // Pass 3: Pattern Application
                staff.forEach(p => {
                    if (dayAsgn[p.name]) return;
                    let idl = PATTERN[( (new Date(start).getDay() + i) - p.restDay + 7) % 7];
                    if (idl === 'O' && i > 0 && buffer[`${p.name}-${dIso(start, i-1)}`] !== 'MN') idl = 'D';
                    dayAsgn[p.name] = idl;
                });

                // Pass 4: Coverage Gaps & Rest Withdrawal
                const mand = ['D', 'MN', 'O']; 
                let miss = mand.filter(s => !Object.values(dayAsgn).includes(s));
                if (miss.length > 0) miss.forEach(m => {
                    // Priority 1: Excess D
                    let cand = staff.find(p => dayAsgn[p.name] === 'D' && Object.values(dayAsgn).filter(v => v==='D').length > 1 && !registry[`${p.name}-${ds}`]?.tweak);
                    // Priority 2: Withdraw Rest (R)
                    if (!cand) {
                        cand = staff.find(p => dayAsgn[p.name] === 'R' && !registry[`${p.name}-${ds}`]?.tweak);
                        if (cand) debt[cand.name] = (debt[cand.name] || 0) + 1;
                    }
                    if (cand) dayAsgn[cand.name] = m;
                });

                // Pass 5: CR Repayment
                staff.forEach(p => {
                    if (debt[p.name] > 0 && !registry[`${p.name}-${ds}`]?.tweak) {
                        // If this person has a debt AND they are currently assigned a non-mandatory excess shift
                        const currentVal = dayAsgn[p.name];
                        const surplusCount = Object.values(dayAsgn).filter(v => v === currentVal).length;
                        // Avoid replacing O-after-MN
                        const prevIso = i > 0 ? dIso(start, i-1) : null;
                        const isMandatoryO = (currentVal === 'O' && buffer[`${p.name}-${prevIso}`] === 'MN');

                        if (surplusCount > 1 && !isMandatoryO && !['R','L'].includes(currentVal)) {
                            dayAsgn[p.name] = 'CR';
                            debt[p.name]--;
                        }
                    }
                });

                staff.forEach(p => buffer[`${p.name}-${ds}`] = dayAsgn[p.name]);
            }

            Object.keys(buffer).forEach(k => { if(!registry[k]?.tweak) registry[k] = { val: buffer[k], tweak: false }; });
            renderTable();
        }

        function dIso(s, o) { const d = new Date(s); d.setDate(d.getDate()+o); return d.toISOString().split('T')[0]; }

        function validate() {
            const start = new Date(document.getElementById('start-date').value);
            const days = parseInt(document.getElementById('days-count').value);
            for(let i=0; i<days; i++) {
                const ds = dIso(start, i); const cnts = { D: 0, MN: 0, O: 0 };
                staff.forEach(p => { const v = registry[`${p.name}-${ds}`]?.val; if(cnts.hasOwnProperty(v)) cnts[v]++; });
                const el = document.getElementById(`cov-${ds}`); if(!el) continue;
                const miss = ['D', 'MN', 'O'].filter(s => cnts[s] === 0);
                el.innerHTML = miss.length > 0 ? `<span class="text-red-400">GAP</span>` : `<span class="opacity-40 tracking-widest uppercase">Secure</span>`;
                staff.forEach(p => {
                    const c = document.getElementById(`cell-${p.name}-${ds}`); if(!c) return;
                    if(['D','MN','O'].includes(c.value) && cnts[c.value] > 1) c.parentElement.classList.add('excess-cell');
                    else c.parentElement.classList.remove('excess-cell');
                });
            }
        }

        function extendPrompt() { document.getElementById('extend-modal').classList.remove('hidden'); }
        function closeModals() { document.getElementById('extend-modal').classList.add('hidden'); }
        function doExtend() {
            const add = parseInt(document.getElementById('ext-val').value) || 7;
            document.getElementById('days-count').value = parseInt(document.getElementById('days-count').value) + add;
            closeModals(); renderTable();
        }
        function resetRoster() { if(confirm("Restore all shifts to pattern? Tweaks will be lost.")) { registry = {}; renderTable(); } }
        function exportCSV() {
            const start = document.getElementById('start-date').value; const days = parseInt(document.getElementById('days-count').value);
            let csv = "ROSTERBOT EXPORT\nName";
            for(let i=0; i<days; i++) csv += `,${dIso(start, i)}`; csv += "\n";
            staff.forEach(p => { csv += p.name; for(let i=0; i<days; i++) csv += `,${registry[`${p.name}-${dIso(start, i)}`]?.val || ''}`; csv += "\n"; });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'RosterBot_Export.csv'; a.click();
        }
    </script>
</body>
</html>
