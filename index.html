            <h3 class="text-2xl font-black mb-2 text-slate-900 tracking-tight">Extend</h3>
            <p class="text-sm text-slate-500 mb-6 font-medium">Days to add to current timeline:</p>
            <input type="number" id="extend-days-val" value="7" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-black mb-8 focus:ring-2 focus:ring-indigo-600 outline-none">
            <div class="flex gap-3">
                <button onclick="closeModal('extend-modal')" class="flex-1 py-4 bg-slate-100 rounded-2xl font-bold text-slate-600 uppercase text-xs">Cancel</button>

    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-md z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-sm w-full shadow-2xl animate-fade">
            <h3 class="text-2xl font-black mb-2 text-red-600 tracking-tight italic">Restore</h3>
            <p class="text-sm text-slate-500 mb-8 font-medium">Wipe all manual tweaks and return to original rotation?</p>
            <div class="flex gap-3">
                <button onclick="closeModal('reset-modal')" class="flex-1 py-4 bg-slate-100 rounded-2xl font-bold text-slate-600 uppercase text-xs">No, Keep</button>
                <button onclick="confirmReset()" class="flex-1 py-4 bg-red-600 rounded-2xl font-bold text-white uppercase text-xs shadow-lg shadow-red-100">Reset All</button>
            </div>
        </div>
    </div>

    <script>
        // --- App State ---
        let staff = [
            { id: '1', name: 'PK', restDay: 2 },
            { id: '2', name: 'SS', restDay: 3 },
            { id: '3', name: 'AG', restDay: 4 },
            { id: '4', name: 'RR', restDay: 5 }
        ];
        
        let centralRegistry = {}; 
        const BASE_PATTERN = ['R', 'D', 'MN', 'O', 'D', 'MN', 'O'];
        const WEEKDAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

        document.getElementById('start-date').valueAsDate = new Date();
        renderStaffList();
        renderTable();

        function renderStaffList() {
            const container = document.getElementById('staff-list');
            container.innerHTML = '';
            staff.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'flex items-center gap-3 p-3 bg-slate-50 rounded-2xl border border-slate-100 transition-all hover:border-indigo-300 group';
                div.innerHTML = `
                    <div class="flex flex-col">
                        <button onclick="moveStaff(${i},-1)" class="text-slate-300 hover:text-indigo-600 ${i===0?'invisible':''}"><svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M14.707 12.707a1 1 0 01-1.414 0L10 9.414l-3.293 3.293a1 1 0 01-1.414-1.414l4-4a1 1 0 011.414 0l4 4a1 1 0 010 1.414z"></path></svg></button>
                        <button onclick="moveStaff(${i},1)" class="text-slate-300 hover:text-indigo-600 ${i===staff.length-1?'invisible':''}"><svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"></path></svg></button>
                    </div>
                    <input type="text" value="${p.name}" onchange="updateStaffName(${i}, this.value)" class="flex-1 bg-transparent font-black text-slate-900 outline-none text-xs">
                    <select onchange="staff[${i}].restDay=parseInt(this.value);renderTable()" class="bg-white border-none rounded-xl text-[8px] font-black text-slate-400 p-2 outline-none ring-1 ring-slate-100">
                        ${WEEKDAYS.map((d,idx) => `<option value="${idx}" ${p.restDay===idx?'selected':''}>${d}</option>`).join('')}
                    </select>
                    <button onclick="staff.splice(${i},1);renderStaffList();renderTable()" class="text-slate-200 hover:text-red-500 p-1"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                `;
                container.appendChild(div);
            });
        }

        function updateStaffName(idx, newVal) {
            const oldName = staff[idx].name;
            const newUpper = newVal.toUpperCase();
            staff[idx].name = newUpper;
            Object.keys(centralRegistry).forEach(key => {
                if (key.startsWith(oldName + '-')) {
                    const datePart = key.split('-').slice(1).join('-');
                    centralRegistry[newUpper + '-' + datePart] = centralRegistry[key];
                    delete centralRegistry[key];
                }
            });
            renderTable();
        }

        function moveStaff(idx, dir) { [staff[idx], staff[idx+dir]] = [staff[idx+dir], staff[idx]]; renderStaffList(); renderTable(); }
        function addStaff() { staff.push({ id: Date.now().toString(), name: 'NEW', restDay: 0 }); renderStaffList(); renderTable(); }

        function renderTable() {
            const startDate = new Date(document.getElementById('start-date').value);
            const days = parseInt(document.getElementById('days-count').value) || 14;
            const table = document.getElementById('roster-table');
            const dates = [];
            for(let i=0; i<days; i++) {
                const d = new Date(startDate); d.setDate(startDate.getDate() + i);
                dates.push({ iso: d.toISOString().split('T')[0], day: d.getDate(), month: d.toLocaleDateString('en-GB', { month: 'short' }), weekIdx: d.getDay(), weekday: WEEKDAYS[d.getDay()] });
            }
            let html = `<thead><tr class="bg-slate-50/50 border-b border-slate-200">
                <th class="sticky-col p-8 text-left font-black text-slate-400 uppercase text-[9px] tracking-[0.2em] min-w-[220px]">Personnel Zone</th>`;
            dates.forEach(d => {
                html += `<th class="p-4 text-center border-r border-slate-50 min-w-[110px]">
                    <div class="text-[10px] text-indigo-500 font-black tracking-tighter">${d.weekday}</div>
                    <div class="text-slate-900 font-black text-sm">${d.day} ${d.month}</div>
                </th>`;
            });
            html += `</tr></thead><tbody class="divide-y divide-slate-100">`;
            staff.forEach(p => {
                html += `<tr><td class="sticky-col p-8 font-black text-slate-700 shadow-sm transition-all">${p.name}<div class="text-[8px] text-indigo-300 uppercase font-black mt-1 tracking-widest">${WEEKDAYS[p.restDay]} Anchor</div></td>`;
                dates.forEach(d => {
                    const key = `${p.name}-${d.iso}`;
                    const entry = centralRegistry[key] || { val: '', isManual: false };
                    html += `<td class="p-0 border-r border-slate-50">
                        <input type="text" id="cell-${key}" value="${entry.val}" oninput="updateRegistryManually('${p.name}','${d.iso}',this.value)" placeholder="-" class="cell-input w-full p-6 text-center bg-transparent font-black uppercase text-sm transition-all ${entry.isManual?'is-tweak':''} shift-${entry.val}">
                    </td>`;
                });
                html += `</tr>`;
            });
            html += `<tr class="bg-slate-900 text-white"><td class="sticky-col !bg-slate-900 p-6 font-black text-[9px] uppercase text-slate-500 italic tracking-[0.2em]">Operational Status</td>`;
            dates.forEach(d => html += `<td id="cov-${d.iso}" class="p-2 text-center text-[8px] font-black">-</td>`);
            html += `</tr></tbody>`;
            table.innerHTML = html;
            validateRoster();
        }

        function updateRegistryManually(name, date, val) {
            const key = `${name}-${date}`;
            const upper = val.toUpperCase();
            if (upper === '') delete centralRegistry[key];
            else centralRegistry[key] = { val: upper, isManual: true };
            const el = document.getElementById(`cell-${key}`);
            el.className = `cell-input w-full p-6 text-center bg-transparent font-black text-sm uppercase transition-all ${upper?'is-tweak':''} shift-${upper}`;
            validateRoster();
        }

        function runTacticalSolver() {
            const startDate = new Date(document.getElementById('start-date').value);
            const days = parseInt(document.getElementById('days-count').value);
            const solverBuffer = {};
            const withdrawnRests = []; 
            for(let i=0; i<days; i++) {
                const currDate = new Date(startDate); currDate.setDate(startDate.getDate() + i);
                const ds = currDate.toISOString().split('T')[0];
                const weekday = currDate.getDay();
                let dayAssignments = {};
                staff.forEach(p => {
                    const key = `${p.name}-${ds}`;
                    if (centralRegistry[key] && centralRegistry[key].isManual) dayAssignments[p.name] = centralRegistry[key].val;
                });
                if (i > 0) {
                    const pds = datesArray(startDate, i-1);
                    staff.forEach(p => {
                        const yesterdayActual = solverBuffer[`${p.name}-${pds}`];
                        if (yesterdayActual === 'MN' && !dayAssignments[p.name]) dayAssignments[p.name] = 'O'; 
                    });
                }
                staff.forEach(p => {
                    if (dayAssignments[p.name]) return; 
                    let ideal = BASE_PATTERN[(weekday - p.restDay + 7) % 7];
                    if (ideal === 'O') {
                        const pds = i > 0 ? datesArray(startDate, i-1) : null;
                        const yesterdayActual = pds ? solverBuffer[`${p.name}-${pds}`] : null;
                        if (yesterdayActual !== 'MN') ideal = 'D'; 
                    }
                    dayAssignments[p.name] = ideal;
                });
                const mandatory = ['D', 'MN', 'O'];
                let missing = mandatory.filter(s => !Object.values(dayAssignments).includes(s));
                if (missing.length > 0) {
                    missing.forEach(miss => {
                        let candidate = staff.find(p => dayAssignments[p.name] === 'D' && Object.values(dayAssignments).filter(v => v==='D').length > 1 && (!centralRegistry[`${p.name}-${ds}`] || !centralRegistry[`${p.name}-${ds}`].isManual));
                        if (!candidate) {
                            candidate = staff.find(p => dayAssignments[p.name] === 'R' && (!centralRegistry[`${p.name}-${ds}`] || !centralRegistry[`${p.name}-${ds}`].isManual));
                            if (candidate) withdrawnRests.push({name: candidate.name, date: ds});
                        }
                        if (candidate) dayAssignments[candidate.name] = miss;
                    });
                }
                staff.forEach(p => {
                    if (dayAssignments[p.name] === 'D' && i >= 2 && (!centralRegistry[`${p.name}-${ds}`] || !centralRegistry[`${p.name}-${ds}`].isManual)) {
                        const v1 = solverBuffer[`${p.name}-${datesArray(startDate, i-1)}`];
                        const v2 = solverBuffer[`${p.name}-${datesArray(startDate, i-2)}`];
                        if (v1 === 'D' && v2 === 'D') if (Object.values(dayAssignments).filter(v => v==='D').length > 1) dayAssignments[p.name] = 'R';
                    }
                });
                staff.forEach(p => solverBuffer[`${p.name}-${ds}`] = dayAssignments[p.name]);
            }
            withdrawnRests.forEach(item => {
                const restDate = new Date(item.date);
                for(let j=1; j<30; j++) {
                    const dsNext = datesArray(restDate, j);
                    if(!solverBuffer[`${staff[0].name}-${dsNext}`]) break;
                    const currentVal = solverBuffer[`${item.name}-${dsNext}`];
                    const prevVal = solverBuffer[`${item.name}-${datesArray(restDate, j-1)}`];
                    const isMandatoryO = (currentVal === 'O' && prevVal === 'MN');
                    const countOfCurrentShift = staff.map(p => solverBuffer[`${p.name}-${dsNext}`]).filter(s => s === currentVal).length;
                    if(countOfCurrentShift > 1 && !isMandatoryO && (!centralRegistry[`${item.name}-${dsNext}`] || !centralRegistry[`${item.name}-${dsNext}`].isManual) && !['R','L','CR'].includes(currentVal)) {
                        solverBuffer[`${item.name}-${dsNext}`] = 'CR';
                        break;
                    }
                }
            });
            Object.keys(solverBuffer).forEach(key => {
                if (!centralRegistry[key] || !centralRegistry[key].isManual) centralRegistry[key] = { val: solverBuffer[key], isManual: false };
            });
            renderTable();
        }

        function datesArray(start, offset) {
            const d = new Date(start); d.setDate(start.getDate() + offset);
            return d.toISOString().split('T')[0];
        }

        function validateRoster() {
            const startDate = new Date(document.getElementById('start-date').value);
            const days = parseInt(document.getElementById('days-count').value);
            for(let i=0; i<days; i++) {
                const d = new Date(startDate); d.setDate(startDate.getDate() + i);
                const ds = d.toISOString().split('T')[0];
                const counts = { D: 0, MN: 0, O: 0, R: 0, CR: 0, L: 0 };
                staff.forEach(p => {
                    const key = `${p.name}-${ds}`;
                    const val = centralRegistry[key] ? centralRegistry[key].val : '';
                    if(val === 'CR') counts['O']++; 
                    else if(counts.hasOwnProperty(val)) counts[val]++;
                });
                const covEl = document.getElementById(`cov-${ds}`);
                const missing = ['D', 'MN', 'O'].filter(s => counts[s] === 0);
                const excess = Object.entries(counts).filter(([k, v]) => ['D', 'MN', 'O'].includes(k) && v > 1);
                if(missing.length > 0) {
                    covEl.innerHTML = `<span class="bg-red-600 text-white px-2 py-0.5 rounded-lg uppercase text-[7px] tracking-widest">Gap</span>`;
                    covEl.parentElement.classList.add('gap-cell');
                } else if(excess.length > 0) {
                    covEl.innerHTML = `<span class="bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded-lg border border-emerald-200 uppercase text-[7px] tracking-widest">Surplus</span>`;
                    covEl.parentElement.classList.remove('gap-cell');
                } else {
                    covEl.innerHTML = `<span class="text-slate-500 opacity-40 uppercase text-[7px] tracking-widest">Balanced</span>`;
                    covEl.parentElement.classList.remove('gap-cell');
                }
                staff.forEach(p => {
                    const key = `${p.name}-${ds}`;
                    const el = document.getElementById(`cell-${key}`);
                    if(el && ['D','MN','O'].includes(el.value) && counts[el.value] > 1) el.parentElement.classList.add('excess-cell');
                    else if(el) el.parentElement.classList.remove('excess-cell');
                });
            }
        }

        function extendRosterPrompt() { document.getElementById('extend-modal').classList.remove('hidden'); }
        function resetToPatternPrompt() { document.getElementById('reset-modal').classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function confirmExtend() {
            const addDays = parseInt(document.getElementById('extend-days-val').value) || 7;
            document.getElementById('days-count').value = parseInt(document.getElementById('days-count').value) + addDays;
            closeModal('extend-modal');
            renderTable();
        }
        function confirmReset() { centralRegistry = {}; closeModal('reset-modal'); renderTable(); }
        function exportCSV() {
            const startDate = document.getElementById('start-date').value;
            const days = parseInt(document.getElementById('days-count').value);
            let csv = "ROSTERBOT EXPORT\nName";
            for(let i=0; i<days; i++) {
                const d = new Date(startDate); d.setDate(d.getDate()+i);
                csv += `,${d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' })}`;
            }
            csv += "\n";
            staff.forEach(p => {
                csv += p.name;
                for(let i=0; i<days; i++) {
                    const d = new Date(startDate); d.setDate(d.getDate()+i);
                    csv += `,${(centralRegistry[`${p.name}-${d.toISOString().split('T')[0]}`] || {val:''}).val}`;
                }
                csv += "\n";
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'RosterBot_Export.csv'; a.click();
        }
    </script>
</body>
</html>
